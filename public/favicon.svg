<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d6446a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9c2a44;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8b84b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9962a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" />
  <!-- Decorative sparkles -->
  <circle cx="14" cy="14" r="1.5" fill="url(#gold)" opacity="0.8" />
  <circle cx="50" cy="50" r="1.5" fill="url(#gold)" opacity="0.6" />
  <!-- Letter B monogram -->
  <text x="32" y="46" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="bold" text-anchor="middle" fill="#ffffff">B</text>
  <!-- Gold dot accent -->
  <circle cx="50" cy="18" r="3" fill="url(#gold)" />
</svg>
